<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Entrance Exam Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4f7b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="app-header">
    <h1>Entrance Exam Practice</h1>
    <nav class="main-nav">
      <button class="nav-btn" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="practice">Topic Practice</button>
      <button class="nav-btn" data-view="quiz">Adaptive Quiz</button>
      <button class="nav-btn" data-view="mock">Mock Test</button>
      <button class="nav-btn" data-view="review">Review</button>
      <button class="nav-btn" data-view="analytics">Analytics</button>
      <button class="nav-btn" data-view="tutor">Tutor</button>
    </nav>
  </header>

  <main>
    <section id="view-dashboard" class="view active">
      <h2>Welcome</h2>
      <div class="cards-grid">
        <article class="card">
          <h3>Average Score</h3>
          <p id="overall-score">0%</p>
        </article>
        <article class="card">
          <h3>Accuracy</h3>
          <p id="overall-accuracy">0%</p>
        </article>
        <article class="card">
          <h3>Current Streak</h3>
          <p id="overall-streak">0</p>
        </article>
      </div>
    </section>

    <section id="view-practice" class="view">
      <h2>Topic Practice</h2>
      <form class="control-row">
        <label>Subject
          <select id="practice-subject">
            <option value="maths">Maths</option>
            <option value="english">English</option>
            <option value="spelling">Spelling</option>
            <option value="mental_arithmetic">Mental Arithmetic</option>
            <option value="verbal_reasoning">Verbal Reasoning</option>
            <option value="non_verbal_reasoning">Non-Verbal Reasoning</option>
          </select>
        </label>

        <label>Difficulty
          <select id="practice-difficulty">
            <option value="1">Easy</option>
            <option value="2">Medium</option>
            <option value="3">Hard</option>
          </select>
        </label>

        <button type="button" id="start-practice">Start</button>
      </form>

      <div id="practice-container" class="question-panel"></div>
    </section>

    <section id="view-quiz" class="view">
      <h2>Adaptive Quiz</h2>

      <form class="control-row">
        <label>Subject
          <select id="quiz-subject">
            <option value="maths">Maths</option>
            <option value="english">English</option>
            <option value="spelling">Spelling</option>
            <option value="mental_arithmetic">Mental Arithmetic</option>
            <option value="verbal_reasoning">Verbal Reasoning</option>
            <option value="non_verbal_reasoning">Non-Verbal Reasoning</option>
          </select>
        </label>

        <label>Questions
          <input type="number" id="quiz-count" min="5" max="30" value="10" />
        </label>

        <button type="button" id="start-quiz">Start Quiz</button>
      </form>

      <div class="quiz-status">
        <div class="status-item"><span>Score</span><p id="quiz-score">0</p></div>
        <div class="status-item"><span>Streak</span><p id="quiz-streak">0</p></div>
        <div class="status-item"><span>Accuracy</span><p id="quiz-accuracy">0%</p></div>
        <div class="status-item"><span>Difficulty</span><p id="quiz-difficulty">-</p></div>
        <div class="status-item timer"><span>Time</span><p id="quiz-timer">30</p></div>
      </div>

      <div id="quiz-container" class="question-panel"></div>
      <p id="quiz-feedback" class="feedback"></p>
    </section>

    <section id="view-mock" class="view">
      <h2>Mock Test</h2>
      <button id="start-mock">Start 30‑Question Mock</button>
      <div id="mock-container" class="question-panel"></div>
      <p id="mock-feedback" class="feedback"></p>
    </section>

    <section id="view-review" class="view">
      <h2>Review Incorrect Answers</h2>
      <div id="review-list"></div>
    </section>

    <section id="view-analytics" class="view">
      <h2>Analytics</h2>
      <ul id="analytics-by-subject"></ul>
      <p id="analytics-difficulty"></p>
    </section>

    <section id="view-tutor" class="view">
      <h2>Tutor Dashboard</h2>
      <form class="control-row">
        <label>Student
          <input type="text" id="tutor-student" />
        </label>
        <label>Subject
          <select id="tutor-subject">
            <option value="maths">Maths</option>
            <option value="english">English</option>
            <option value="spelling">Spelling</option>
            <option value="mental_arithmetic">Mental Arithmetic</option>
            <option value="verbal_reasoning">Verbal Reasoning</option>
            <option value="non_verbal_reasoning">Non-Verbal Reasoning</option>
          </select>
        </label>
        <label>Questions
          <input type="number" id="tutor-count" min="5" max="30" value="10" />
        </label>
        <button type="button" id="tutor-assign">Assign</button>
      </form>

      <div id="tutor-assignments"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>Entrance Exam Practice — For My Students</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
