<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Entrance Exam Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- colourful kid-friendly CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <header class="app-header">
    <h1>Entrance Exam Practice</h1>
    <nav class="main-nav">
      <button class="nav-btn" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="quiz">Quiz</button>
    </nav>
  </header>

  <main>
    <!-- DASHBOARD VIEW -->
    <section id="view-dashboard" class="view active">
      <h2>Welcome</h2>
      <div class="cards-grid">
        <article class="card">
          <h3>Average Score</h3>
          <p id="overall-score">0%</p>
        </article>
        <article class="card">
          <h3>Total Questions Answered</h3>
          <p id="overall-questions">0</p>
        </article>
      </div>
    </section>

    <!-- QUIZ VIEW -->
    <section id="view-quiz" class="view">
      <h2>Quiz Time!</h2>

      <!-- name + start button -->
      <div class="question-panel">
        <label>
          Quiz hero name:
          <input
            type="text"
            id="student-name"
            placeholder="Type your name to begin"
          />
        </label>
        <button id="start-quiz" class="primary-btn">Start Quiz</button>
      </div>

      <!-- timer on the right -->
      <div class="quiz-status">
        <div class="status-item timer">
          <span>Time left (s)</span>
          <p id="quiz-timer">15</p>
        </div>
      </div>

      <!-- question + options -->
      <div id="quiz-container" class="question-panel">
        <p id="quiz-question"></p>
        <div id="quiz-options"></div>
      </div>

      <p id="quiz-feedback" class="feedback"></p>
      <button id="next-question" class="primary-btn" disabled>Next Question</button>
    </section>
  </main>

  <footer class="app-footer">
    <p>Entrance Exam Practice — For My Students</p>
  </footer>

  <!-- question bank + quiz logic -->
  <script src="{{ url_for('static', filename='questions.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}" type="module"></script>
</body>
</html>
